<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proiect SPG - Restaurare Munți și Flori pe Iarbă</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #8cb7e6; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      text-shadow: 1px 1px 2px black;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
<div id="info">P2: Munți Originali + Flori Mari (Evită Drumul)<br>Obiecte statice plasate conform S6</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // --- 1. SETĂRI DE BAZĂ ---
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x8cb7e6, 500, 3500);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1.0, 8000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setClearColor(new THREE.Color(0.55, 0.72, 0.90));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // --- 2. LUMINI ---
  const ambientLight = new THREE.AmbientLight(new THREE.Color(0.50, 0.48, 0.40), 1.0);
  scene.add(ambientLight);

  const sunLight = new THREE.DirectionalLight(new THREE.Color(1.0, 0.95, 0.80), 1.5);
  sunLight.position.set(-100, 300, 200);
  scene.add(sunLight);

  // --- 3. TEXTURI ---
  const textureLoader = new THREE.TextureLoader();
  const cerTexture = textureLoader.load('textures/cer.jpg');
  const muntiTexture = textureLoader.load('textures/munti.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  });
  const iarbaTexture = textureLoader.load('textures/iarba.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  });
  const drumTexture = textureLoader.load('textures/drum.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(1, 25);
  });

  // --- 4. FUNKCII UTILIBARE ȘI LOGICĂ TEREN ---
  const bulldozerThreshold = 18.0;

  function clamp01(v) { return Math.max(0.0, Math.min(1.0, v)); }
  function ridged(x) {
    let v = 1.0 - Math.abs(Math.sin(x));
    return Math.pow(v, 2.4);
  }

  function getTerrainHeight(x, z) {
    const bump1 = 15.0 * Math.exp(-((x * x) / 50000 + ((z + 80.0) * (z + 80.0)) / 30000));
    const waves = 12.0 * Math.sin(0.01 * x) * Math.cos(0.01 * z);
    let finalY = (bump1 + waves);
    if (finalY > bulldozerThreshold) {
      finalY = bulldozerThreshold + (finalY - bulldozerThreshold) * 0.2;
    }
    return finalY;
  }

  // --- 5. CER (SKYBOX) ---
  const skyboxGeometry = new THREE.BoxGeometry(4000, 4000, 4000);
  const skyboxMaterials = [
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ color: 0x8cb7e6, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false })
  ];
  const skybox = new THREE.Mesh(skyboxGeometry, skyboxMaterials);
  scene.add(skybox);

  // --- 6. MUNȚII ÎN FUNDAL (ORIGINALI) ---
  function createMountainsReal() {
    const xMin = -1900.0, xMax = 1900.0;
    const zNear = -300.0, zFar = -1450.0;
    const NX = 180, NZ = 90;
    const yOffset = -115.0;
    const width = xMax - xMin;
    const depth = zNear - zFar;

    const mountainGeo = new THREE.PlaneGeometry(width, depth, NX, NZ);
    mountainGeo.rotateX(-Math.PI / 2);
    mountainGeo.translate((xMax+xMin)/2, 0, (zNear+zFar)/2);

    const pos = mountainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const z = pos.getZ(i);
      let dist = clamp01((-z - 300.0) / 1100.0);
      const t1 = 0.0032 * x + 0.0017 * z;
      const t2 = 0.0067 * x - 0.0039 * z;
      const t3 = 0.0130 * x + 0.0110 * z;
      const base = 0.55 * (Math.sin(t1) * 0.5 + 0.5) + 0.35 * (Math.sin(t2) * 0.5 + 0.5) + 0.10 * (Math.sin(t3) * 0.5 + 0.5);
      const spikes = 0.55 * ridged(2.2 * t1) + 0.30 * ridged(3.7 * t2) + 0.15 * ridged(6.0 * t3);
      let h = Math.pow(0.78 * base + 0.22 * spikes, 1.25);
      pos.setY(i, (h * (40.0 + dist * 520.0) * 1.22) + yOffset);
    }
    mountainGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(mountainGeo, new THREE.MeshPhongMaterial({ map: muntiTexture, color: 0x888888 })));
  }

  // --- 7. TEREN ȘI PATCH (ORIGINAL) ---
  function createGround() {
    const groundGeo = new THREE.PlaneGeometry(4000, 4000);
    groundGeo.rotateX(-Math.PI / 2);
    scene.add(new THREE.Mesh(groundGeo, new THREE.MeshPhongMaterial({ map: iarbaTexture })));

    const xMin = -1000.0, xMax = 1000.0;
    const zMin = -500.0, zMax = 800.0;
    const patchGeo = new THREE.PlaneGeometry(xMax-xMin, zMax-zMin, 180, 160);
    patchGeo.rotateX(-Math.PI / 2);
    patchGeo.translate((xMax+xMin)/2, 0, (zMax+zMin)/2);

    const patchPos = patchGeo.attributes.position;
    for(let i=0; i<patchPos.count; i++) {
      patchPos.setY(i, getTerrainHeight(patchPos.getX(i), patchPos.getZ(i)));
    }
    patchGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(patchGeo, new THREE.MeshPhongMaterial({ map: iarbaTexture })));
  }

  // --- 8. CIRCUIT NEREGULAT ---
  const pathCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-700, 0, 400),
    new THREE.Vector3(-450, 0, 750),
    new THREE.Vector3(150, 0, 600),
    new THREE.Vector3(550, 0, 850),
    new THREE.Vector3(800, 0, 300),
    new THREE.Vector3(450, 0, -100),
    new THREE.Vector3(50, 0, -250),
    new THREE.Vector3(-500, 0, -50)
  ], true);

  function createCircuit() {
    const tubeGeo = new THREE.TubeGeometry(pathCurve, 128, 40, 10, true);
    const potecaMesh = new THREE.Mesh(tubeGeo, new THREE.MeshPhongMaterial({ map: drumTexture, side: THREE.DoubleSide }));
    potecaMesh.scale.set(1, 0.02, 1);
    potecaMesh.position.y = 20.5;
    scene.add(potecaMesh);
  }

  // --- 9. OBIECTE STATICE: FLORI MARI (P2.3) ---
  function createEdelweiss() {
    const flowerGroup = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10, 4), new THREE.MeshPhongMaterial({ color: 0x447744 }));
    stem.position.y = 5;
    flowerGroup.add(stem);
    const center = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshPhongMaterial({ color: 0xffcc44 }));
    center.position.y = 10;
    flowerGroup.add(center);
    const petalGeo = new THREE.ConeGeometry(1, 5, 3);
    petalGeo.rotateX(-Math.PI / 2);
    for (let i = 0; i < 6; i++) {
      const petal = new THREE.Mesh(petalGeo, new THREE.MeshPhongMaterial({ color: 0xffffff }));
      const angle = (Math.PI * 2 / 6) * i;
      petal.position.y = 10.2;
      petal.position.x = 1.5 * Math.cos(angle);
      petal.position.z = 1.5 * Math.sin(angle);
      petal.rotation.y = angle;
      flowerGroup.add(petal);
    }
    flowerGroup.scale.set(1.5, 1.5, 1.5); // Flori mari
    return flowerGroup;
  }

  function isOnRoad(x, z, threshold = 85) {
    const points = pathCurve.getPoints(200);
    for (let p of points) {
      const distSq = (x - p.x)**2 + (z - p.z)**2;
      if (distSq < threshold * threshold) return true;
    }
    return false;
  }

  function populateFieldWithFlowers(numClusters = 65) {
    let placed = 0;
    while (placed < numClusters) {
      const randX = Math.random() * 1800 - 900;
      const randZ = Math.random() * 1200 - 450;

      if (!isOnRoad(randX, randZ)) {
        const cluster = new THREE.Group();
        cluster.position.set(randX, getTerrainHeight(randX, randZ), randZ);
        for (let j = 0; j < 3; j++) {
          const flower = createEdelweiss();
          flower.position.set(Math.random() * 25 - 12.5, 0, Math.random() * 25 - 12.5);
          flower.rotation.y = Math.random() * Math.PI;
          cluster.add(flower);
        }
        scene.add(cluster);
        placed++;
      }
    }
  }

  // --- INIȚIALIZARE ---
  createMountainsReal();
  createGround();
  createCircuit();
  populateFieldWithFlowers(65);

  camera.position.set(0, 400, 1200);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  animate();
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
