<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proiect SPG - Examen Complet</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #8cb7e6; }
    canvas { display: block; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // --- 1. SETĂRI DE BAZĂ ȘI UMBRE ---
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x8cb7e6, 500, 3500);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1.0, 8000);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setClearColor(new THREE.Color(0.55, 0.72, 0.90));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const obstacles = [];

  // --- 2. LUMINI GLOBALE ---
  const ambientLight = new THREE.AmbientLight(new THREE.Color(0.40, 0.38, 0.35), 0.8);
  scene.add(ambientLight);

  const sunLight = new THREE.DirectionalLight(new THREE.Color(1.0, 0.95, 0.85), 1.2);
  sunLight.position.set(-500, 800, 400);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.width = 2048;
  sunLight.shadow.mapSize.height = 2048;
  sunLight.shadow.camera.near = 100;
  sunLight.shadow.camera.far = 3000;
  const d = 1500;
  sunLight.shadow.camera.left = -d;
  sunLight.shadow.camera.right = d;
  sunLight.shadow.camera.top = d;
  sunLight.shadow.camera.bottom = -d;
  sunLight.shadow.bias = -0.001;
  scene.add(sunLight);

  // --- 3. TEXTURI ---
  const textureLoader = new THREE.TextureLoader();
  const cerTexture = textureLoader.load('textures/cer.jpg');
  const muntiTexture = textureLoader.load('textures/munti.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  });
  const iarbaTexture = textureLoader.load('textures/iarba.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  });
  const drumTexture = textureLoader.load('textures/drum.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(1, 25);
  });

  // --- 4. MATEMATICA TERENULUI ȘI A DRUMULUI ---
  const pathCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-700, 0, 400), new THREE.Vector3(-450, 0, 750),
    new THREE.Vector3(150, 0, 600),  new THREE.Vector3(550, 0, 850),
    new THREE.Vector3(800, 0, 300),  new THREE.Vector3(450, 0, -100),
    new THREE.Vector3(50, 0, -250),  new THREE.Vector3(-500, 0, -50)
  ], true);

  const roadPoints = pathCurve.getPoints(400);

  function getDistanceToRoad(x, z) {
    let minDistSq = Infinity;
    for (let i = 0; i < roadPoints.length; i++) {
      const p = roadPoints[i];
      const dx = x - p.x;
      const dz = z - p.z;
      const distSq = dx*dx + dz*dz;
      if (distSq < minDistSq) minDistSq = distSq;
    }
    return Math.sqrt(minDistSq);
  }

  const bulldozerThreshold = 18.0;
  const ROAD_HEIGHT = 1.0;

  function clamp01(v) { return Math.max(0.0, Math.min(1.0, v)); }
  function ridged(x) { return Math.pow(1.0 - Math.abs(Math.sin(x)), 2.4); }

  function getRawTerrainHeight(x, z) {
    const bump1 = 15.0 * Math.exp(-((x * x) / 50000 + ((z + 80.0) * (z + 80.0)) / 30000));
    const waves = 12.0 * Math.sin(0.01 * x) * Math.cos(0.01 * z);
    let finalY = (bump1 + waves);
    if (finalY > bulldozerThreshold) {
      finalY = bulldozerThreshold + (finalY - bulldozerThreshold) * 0.2;
    }
    return finalY;
  }

  function getTerrainHeight(x, z) {
    const rawY = getRawTerrainHeight(x, z);
    const dist = getDistanceToRoad(x, z);
    const roadHalfWidth = 22;
    const blendZone = 40;

    if (dist < roadHalfWidth) return ROAD_HEIGHT;
    else if (dist < roadHalfWidth + blendZone) {
      let t = (dist - roadHalfWidth) / blendZone;
      t = t * t * (3 - 2 * t);
      return ROAD_HEIGHT * (1 - t) + rawY * t;
    } else return rawY;
  }

  function getMountainHeight(x, z) {
    if (z > -300) return -9999;
    let dist = clamp01((-z - 300.0) / 1100.0);
    const t1 = 0.0032 * x + 0.0017 * z;
    const t2 = 0.0067 * x - 0.0039 * z;
    const t3 = 0.0130 * x + 0.0110 * z;
    const base = 0.55 * (Math.sin(t1) * 0.5 + 0.5) + 0.35 * (Math.sin(t2) * 0.5 + 0.5) + 0.10 * (Math.sin(t3) * 0.5 + 0.5);
    const spikes = 0.55 * ridged(2.2 * t1) + 0.30 * ridged(3.7 * t2) + 0.15 * ridged(6.0 * t3);
    let h = Math.pow(0.78 * base + 0.22 * spikes, 1.25);
    return (h * (40.0 + dist * 520.0) * 1.22) - 115.0;
  }

  // --- 5. CER ȘI MUNȚI ---
  const skyboxGeometry = new THREE.BoxGeometry(4000, 4000, 4000);
  const skyboxMaterials = [
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ color: 0x8cb7e6, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false })
  ];
  scene.add(new THREE.Mesh(skyboxGeometry, skyboxMaterials));

  function createMountainsReal() {
    const mountainGeo = new THREE.PlaneGeometry(3800, 1150, 180, 90);
    mountainGeo.rotateX(-Math.PI / 2);
    mountainGeo.translate(0, 0, -875);

    const pos = mountainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.setY(i, getMountainHeight(pos.getX(i), pos.getZ(i)));
    }
    mountainGeo.computeVertexNormals();
    const mountainMesh = new THREE.Mesh(mountainGeo, new THREE.MeshPhongMaterial({ map: muntiTexture, color: 0x888888 }));
    mountainMesh.receiveShadow = true;
    scene.add(mountainMesh);
  }

  // --- 6. TEREN SINGULAR ---
  function createGround() {
    const groundGeo = new THREE.PlaneGeometry(4000, 4000, 256, 256);
    groundGeo.rotateX(-Math.PI / 2);

    const pos = groundGeo.attributes.position;
    for(let i = 0; i < pos.count; i++) {
      pos.setY(i, getTerrainHeight(pos.getX(i), pos.getZ(i)));
    }
    groundGeo.computeVertexNormals();
    const groundMesh = new THREE.Mesh(groundGeo, new THREE.MeshPhongMaterial({ map: iarbaTexture }));
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);
  }

  // --- 7. CIRCUIT PANGLICĂ ---
  function createCircuit() {
    const pointsCount = 400;
    const roadWidth = 40;
    const vertices = [], uvs = [], indices = [], normals = [];

    for(let i = 0; i <= pointsCount; i++) {
      const t = i / pointsCount;
      const pt = pathCurve.getPointAt(t);
      const tangent = pathCurve.getTangentAt(t).normalize();
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();

      const pLeft = pt.clone().add(normal.clone().multiplyScalar(roadWidth / 2));
      const pRight = pt.clone().add(normal.clone().multiplyScalar(-roadWidth / 2));

      pLeft.y = getTerrainHeight(pLeft.x, pLeft.z) + 1.5;
      pRight.y = getTerrainHeight(pRight.x, pRight.z) + 1.5;

      vertices.push(pLeft.x, pLeft.y, pLeft.z);
      vertices.push(pRight.x, pRight.y, pRight.z);

      normals.push(0, 1, 0, 0, 1, 0);
      uvs.push(0, t * 25, 1, t * 25);
    }

    for(let i = 0; i < pointsCount; i++) {
      const idx = i * 2;
      indices.push(idx, idx+2, idx+1);
      indices.push(idx+1, idx+2, idx+3);
    }

    const roadGeo = new THREE.BufferGeometry();
    roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    roadGeo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
    roadGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    roadGeo.setIndex(indices);

    const potecaMesh = new THREE.Mesh(roadGeo, new THREE.MeshPhongMaterial({ map: drumTexture, side: THREE.DoubleSide }));
    potecaMesh.receiveShadow = true;
    scene.add(potecaMesh);
  }

  // --- 8. OBIECTE STATICE ---
  function createEdelweiss() {
    const flowerGroup = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10, 4), new THREE.MeshPhongMaterial({ color: 0x447744 }));
    stem.position.y = 5; stem.castShadow = true; flowerGroup.add(stem);
    const center = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshPhongMaterial({ color: 0xffcc44 }));
    center.position.y = 10; center.castShadow = true; flowerGroup.add(center);
    const petalGeo = new THREE.ConeGeometry(1, 5, 3);
    petalGeo.rotateX(-Math.PI / 2);
    for (let i = 0; i < 6; i++) {
      const petal = new THREE.Mesh(petalGeo, new THREE.MeshPhongMaterial({ color: 0xffffff }));
      const angle = (Math.PI * 2 / 6) * i;
      petal.position.set(1.5 * Math.cos(angle), 10.2, 1.5 * Math.sin(angle));
      petal.rotation.y = angle; petal.castShadow = true;
      flowerGroup.add(petal);
    }
    flowerGroup.scale.set(0.35, 0.35, 0.35); // Flori micuțe și delicate
    return flowerGroup;
  }

  function createStone() {
    const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(3 + Math.random() * 4, 0), new THREE.MeshPhongMaterial({ color: 0x888888, flatShading: true }));
    stone.scale.set(1 + Math.random() * 0.5, 0.6 + Math.random() * 0.4, 1 + Math.random() * 0.5);
    stone.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    stone.castShadow = true; stone.receiveShadow = true;
    return stone;
  }

  function createPineTreeTall() {
    const treeGroup = new THREE.Group();
    const trunkHeight = 25 + Math.random() * 10;
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 2.2, trunkHeight, 6), new THREE.MeshPhongMaterial({ color: 0x5c4033, flatShading: true }));
    trunk.position.y = trunkHeight / 2; trunk.castShadow = true; trunk.receiveShadow = true; treeGroup.add(trunk);
    const leavesMat = new THREE.MeshPhongMaterial({ color: [0x224422, 0x1a3a1a, 0x2a502a][Math.floor(Math.random()*3)], flatShading: true });
    const coneCount = 3 + Math.floor(Math.random() * 2);
    for (let i = 0; i < coneCount; i++) {
      const cone = new THREE.Mesh(new THREE.ConeGeometry(9 - (i * 1.5), 18 - (i * 1.5), 7), leavesMat);
      cone.position.y = trunkHeight + (i * 7); cone.castShadow = true; cone.receiveShadow = true; treeGroup.add(cone);
    }
    const finalScale = 1.0 + Math.random() * 0.5;
    treeGroup.scale.set(finalScale, finalScale, finalScale);
    return treeGroup;
  }

  function createStreetLight(position, directionToRoad) {
    const group = new THREE.Group();
    group.position.copy(position);

    const metalMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 45, 8), metalMat);
    pole.position.y = 22.5; pole.castShadow = true; group.add(pole);

    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 14, 8), metalMat);
    arm.rotation.x = Math.PI / 2; arm.position.set(0, 43, 7); arm.castShadow = true; group.add(arm);

    const bulb = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshBasicMaterial({ color: 0xffffee }));
    bulb.position.set(0, 42.5, 13); group.add(bulb);

    const spotLight = new THREE.SpotLight(0xffeedd, 3.5, 400, Math.PI / 3, 0.6, 1.5);
    spotLight.position.set(0, 42.5, 13);
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.width = 1024; spotLight.shadow.mapSize.height = 1024;
    spotLight.shadow.bias = -0.001;

    const target = new THREE.Object3D();
    target.position.set(0, 0, 30);
    group.add(target); spotLight.target = target; group.add(spotLight);

    const targetPos = position.clone().add(directionToRoad);
    targetPos.y = position.y;
    group.lookAt(targetPos);
    scene.add(group);
  }

  function isOnRoad(x, z, threshold = 95) {
    return getDistanceToRoad(x, z) < threshold;
  }

  function populateField() {
    let count = 0;
    while (count < 60) {
      const rX = Math.random() * 1800 - 900, rZ = Math.random() * 1100 - 300;
      if (getDistanceToRoad(rX, rZ) >= 80) {
        const cluster = new THREE.Group();
        cluster.position.set(rX, getTerrainHeight(rX, rZ), rZ);

        for (let j = 0; j < 3; j++) {
          const flower = createEdelweiss();
          const offsetX = Math.random() * 20 - 10;
          const offsetZ = Math.random() * 20 - 10;

          flower.position.set(offsetX, 0, offsetZ);
          flower.rotation.y = Math.random() * Math.PI;
          cluster.add(flower);

          const flowerWorldX = rX + offsetX;
          const flowerWorldZ = rZ + offsetZ;
          obstacles.push({ x: flowerWorldX, z: flowerWorldZ, radius: 0.8 });
        }
        scene.add(cluster); count++;
      }
    }

    count = 0;
    while (count < 70) {
      const rX = Math.random() * 1800 - 900, rZ = Math.random() * 1100 - 300;
      if (getDistanceToRoad(rX, rZ) >= 80) {
        const stone = createStone();
        stone.position.set(rX, getTerrainHeight(rX, rZ), rZ);
        scene.add(stone); count++;
        obstacles.push({ x: rX, z: rZ, radius: 4.0 });
      }
    }

    count = 0;
    while (count < 75) {
      const rX = Math.random() * 1800 - 900, rZ = Math.random() * 1100 - 300;
      if (getDistanceToRoad(rX, rZ) >= 110) {
        const tree = createPineTreeTall();
        tree.position.set(rX, getTerrainHeight(rX, rZ), rZ);
        scene.add(tree); count++;
        obstacles.push({ x: rX, z: rZ, radius: 3.5 });
      }
    }
  }

  function populateStreetLights() {
    const numLights = 14;
    for (let i = 0; i < numLights; i++) {
      const t = i / numLights;
      const point = pathCurve.getPointAt(t);
      const tangent = pathCurve.getTangentAt(t).normalize();
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
      const offset = 45;
      const lightPos = point.clone().add(normal.clone().multiplyScalar(offset));
      lightPos.y = getTerrainHeight(lightPos.x, lightPos.z);

      const dirToRoad = normal.clone().multiplyScalar(-1);
      createStreetLight(lightPos, dirToRoad);

      obstacles.push({ x: lightPos.x, z: lightPos.z, radius: 4.0 });
    }
  }

  // --- 9. CONSTRUIREA MAȘINILOR NPC ---
  function createCarModel(bodyColor) {
    const group = new THREE.Group();
    const chassisGeo = new THREE.BoxGeometry(6, 4, 12);
    const chassisMat = new THREE.MeshPhongMaterial({ color: bodyColor });
    const chassis = new THREE.Mesh(chassisGeo, chassisMat);
    chassis.position.y = 3; chassis.castShadow = true; group.add(chassis);

    const wheelGeo = new THREE.CylinderGeometry(1.5, 1.5, 1.5, 16);
    wheelGeo.rotateZ(Math.PI / 2);
    const wheelMat = new THREE.MeshPhongMaterial({ color: 0x222222 });

    const wheelPositions = [[-3.5, 1.5, -4], [3.5, 1.5, -4], [-3.5, 1.5, 4], [3.5, 1.5, 4]];
    wheelPositions.forEach(pos => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.position.set(pos[0], pos[1], pos[2]);
      wheel.castShadow = true; group.add(wheel);
    });

    // MODIFICARE: Dimensiune mașini redusă la 1.5 (arată ca mașini normale pe banda de 40)
    group.scale.set(2, 2, 2);
    return group;
  }

  const npcCars = [
    { mesh: createCarModel(0x0044cc), t: 0.10, speed: 0.0006, lane: 10 },
    { mesh: createCarModel(0x00cc44), t: 0.30, speed: 0.0004, lane: 10 },
    { mesh: createCarModel(0xff8800), t: 0.50, speed: 0.0007, lane: -8 },
    { mesh: createCarModel(0xaa00cc), t: 0.80, speed: 0.0005, lane: -8 }
  ];
  npcCars.forEach(npc => scene.add(npc.mesh));

  // --- 10. CONSTRUIREA PIETONULUI (JUCĂTOR) ---
  const Mesh = THREE.Mesh;

  function createPlayerModel() {
    const group = new THREE.Group();
    const skinMat = new THREE.MeshPhongMaterial({ color: 0xffccaa });
    const shirtMat = new THREE.MeshPhongMaterial({ color: 0xcc0000 });
    const pantsMat = new THREE.MeshPhongMaterial({ color: 0x1133cc });

    const legGeo = new THREE.CylinderGeometry(0.4, 0.4, 2.5);
    const legL = new THREE.Mesh(legGeo, pantsMat);
    legL.position.set(-0.5, 1.25, 0); legL.castShadow = true; group.add(legL);
    const legR = new THREE.Mesh(legGeo, pantsMat);
    legR.position.set(0.5, 1.25, 0); legR.castShadow = true; group.add(legR);

    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 2.5), shirtMat);
    body.position.y = 3.75; body.castShadow = true; group.add(body);

    const armGeo = new THREE.CylinderGeometry(0.3, 0.3, 2.5);
    const armL = new THREE.Mesh(armGeo, skinMat);
    armL.position.set(-1.3, 3.75, 0); armL.castShadow = true; group.add(armL);
    const armR = new Mesh(armGeo, skinMat);
    armR.position.set(1.3, 3.75, 0); armR.castShadow = true; group.add(armR);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), skinMat);
    head.position.y = 5.5; head.castShadow = true; group.add(head);

    const capGroup = new THREE.Group();
    capGroup.position.y = 5.5;

    // Șapcă perfect roșie, complet acoperitoare pe creștet
    const capDomeGeo = new THREE.SphereGeometry(0.82, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2.2);
    const capDome = new THREE.Mesh(capDomeGeo, shirtMat);
    capDome.position.y = 0.05;
    capDome.castShadow = true;
    capGroup.add(capDome);

    const capBrimGeo = new THREE.BoxGeometry(1.2, 0.1, 0.8);
    const capBrim = new THREE.Mesh(capBrimGeo, shirtMat);
    capBrim.position.set(0, 0.1, 0.6);
    capBrim.castShadow = true;
    capGroup.add(capBrim);

    group.add(capGroup);
    group.scale.set(2.5, 2.5, 2.5);
    return group;
  }

  const playerGroup = createPlayerModel();
  scene.add(playerGroup);

  const startPos = pathCurve.getPointAt(0);
  playerGroup.position.set(startPos.x, getTerrainHeight(startPos.x, startPos.z), startPos.z);
  const startTangent = pathCurve.getTangentAt(0);
  const lookTarget = startPos.clone().add(startTangent);
  lookTarget.y = playerGroup.position.y;
  playerGroup.lookAt(lookTarget);

  function updateNPCCars() {
    npcCars.forEach((npc, index) => {
      let canMove = true;
      const npcPos = npc.mesh.position;
      const forwardDir = pathCurve.getTangentAt(npc.t).normalize();

      let toPlayer = playerGroup.position.clone().sub(npcPos);
      // Ajustat distanța de alertă pentru mașini mai mici
      if (toPlayer.lengthSq() < 400) {
        if (toPlayer.normalize().dot(forwardDir) > 0.3) canMove = false;
      }

      npcCars.forEach((otherNpc, j) => {
        if (index === j) return;
        let toOther = otherNpc.mesh.position.clone().sub(npcPos);
        if (toOther.lengthSq() < 625) { // Distanță între 2 mașini micșorată proporțional
          if (toOther.normalize().dot(forwardDir) > 0.3) canMove = false;
        }
      });

      if (canMove) {
        npc.t += npc.speed;
        if (npc.t > 1.0) npc.t -= 1.0;
      }

      const pt = pathCurve.getPointAt(npc.t);
      const tangent = pathCurve.getTangentAt(npc.t).normalize();
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();

      const finalPos = pt.clone().add(normal.multiplyScalar(npc.lane));
      npc.mesh.position.set(finalPos.x, getTerrainHeight(finalPos.x, finalPos.z) + 1.5, finalPos.z);

      const lookT = finalPos.clone().add(tangent);
      lookT.y = npc.mesh.position.y;
      npc.mesh.lookAt(lookT);
    });
  }

  // --- 11. ANIMALE ---
  function checkAnimalCollision(nextX, nextZ, animalRadius) {
    if (nextX < -1900 || nextX > 1900 || nextZ > 1900 || nextZ < -1400) return true;
    if (getMountainHeight(nextX, nextZ) > getTerrainHeight(nextX, nextZ) + 1.0) return true;
    if (getDistanceToRoad(nextX, nextZ) < 35) return true;

    for(let obs of obstacles) {
      const dx = nextX - obs.x;
      const dz = nextZ - obs.z;
      if( (dx*dx + dz*dz) < (obs.radius + animalRadius)**2 ) return true;
    }
    return false;
  }

  // VĂCUȚELE
  function createCow() {
    const cowGroup = new THREE.Group();
    const whiteMat = new THREE.MeshPhongMaterial({ color: 0xeeeeee });
    const blackMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const pinkMat = new THREE.MeshPhongMaterial({ color: 0xffaaaa });

    const body = new THREE.Mesh(new THREE.BoxGeometry(3, 2.5, 5), whiteMat);
    body.position.y = 2.5; body.castShadow = true; cowGroup.add(body);
    const head = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2.5), whiteMat);
    head.position.set(0, 3.5, 3.5); head.castShadow = true; cowGroup.add(head);
    const snout = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1, 1), pinkMat);
    snout.position.set(0, 3, 4.8); snout.castShadow = true; cowGroup.add(snout);
    const spot1 = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), blackMat);
    spot1.position.set(1.51, 2.5, 0); spot1.rotation.y = Math.PI/2; cowGroup.add(spot1);
    const spot2 = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 1.5), blackMat);
    spot2.position.set(-1.51, 2.5, 1); spot2.rotation.y = -Math.PI/2; cowGroup.add(spot2);
    const legGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.5);
    const legPos = [[-1, 0.75, -1.5], [1, 0.75, -1.5], [-1, 0.75, 1.5], [1, 0.75, 1.5]];
    legPos.forEach(p => {
      const leg = new THREE.Mesh(legGeo, blackMat);
      leg.position.set(...p); leg.castShadow = true; cowGroup.add(leg);
    });

    cowGroup.scale.set(2.8, 2.8, 2.8);
    return cowGroup;
  }

  const cows = [];
  function populateCows() {
    for(let i=0; i<20; i++) {
      let cowMesh = createCow();
      let rx, rz, isSafe;
      do {
        isSafe = true;
        rx = Math.random() * 1800 - 900;
        rz = Math.random() * 1100 - 300;
        if(getDistanceToRoad(rx, rz) < 100) isSafe = false;
        if(getMountainHeight(rx, rz) > getTerrainHeight(rx, rz) + 1.0) isSafe = false;
        for(let obs of obstacles) {
          const dx = rx - obs.x; const dz = rz - obs.z;
          if((dx*dx + dz*dz) < (obs.radius + 15.0)**2) { isSafe = false; break; }
        }
      } while(!isSafe);
      cowMesh.position.set(rx, getTerrainHeight(rx, rz), rz);
      scene.add(cowMesh);

      cows.push({
        mesh: cowMesh,
        angle: Math.random() * Math.PI * 2,
        speed: 0.15 + Math.random() * 0.15,
        actionTimer: Math.random() * 100,
        isMoving: true
      });
    }
  }

  function updateCows() {
    cows.forEach(cow => {
      cow.actionTimer--;
      if(cow.actionTimer <= 0) {
        cow.isMoving = Math.random() > 0.2;
        if(!cow.isMoving) {
          cow.actionTimer = 60 + Math.random() * 100;
        } else {
          cow.angle += (Math.random() - 0.5) * Math.PI / 2;
          cow.actionTimer = 180 + Math.random() * 300;
        }
      }

      // LOGICĂ NOUĂ: Vaca evită pietonul (așteaptă ca mașinile)
      let canMove = cow.isMoving;
      const forwardDir = new THREE.Vector3(Math.sin(cow.angle), 0, Math.cos(cow.angle));
      let toPlayer = playerGroup.position.clone().sub(cow.mesh.position);

      if (toPlayer.lengthSq() < 625) {
        if (toPlayer.normalize().dot(forwardDir) > 0.2) {
          canMove = false; // Vaca se oprește dacă pietonul e în fața ei
        }
      }

      if(canMove) {
        const dx = Math.sin(cow.angle) * cow.speed;
        const dz = Math.cos(cow.angle) * cow.speed;
        const nx = cow.mesh.position.x + dx;
        const nz = cow.mesh.position.z + dz;

        if(!checkAnimalCollision(nx, nz, 6.0)) {
          cow.mesh.position.x = nx;
          cow.mesh.position.z = nz;
          cow.mesh.rotation.y = Math.atan2(dx, dz);
          const bounce = Math.abs(Math.sin(Date.now() * 0.01)) * 0.8;
          cow.mesh.position.y = getTerrainHeight(nx, nz) + bounce;
        } else {
          cow.angle += Math.PI + (Math.random() - 0.5);
          cow.actionTimer = 150;
          cow.isMoving = true;
        }
      } else {
        cow.mesh.position.y = getTerrainHeight(cow.mesh.position.x, cow.mesh.position.z);
      }
    });
  }

  // CĂȚELUȘII
  function createDog() {
    const dogGroup = new THREE.Group();
    const beigeMat = new THREE.MeshPhongMaterial({ color: 0xe8c396 });
    const blackMat = new THREE.MeshPhongMaterial({ color: 0x222222 });

    const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.2, 2.5), beigeMat);
    body.position.y = 1.2; body.castShadow = true; dogGroup.add(body);
    const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), beigeMat);
    head.position.set(0, 2.0, 1.5); head.castShadow = true; dogGroup.add(head);
    const snout = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.8), blackMat);
    snout.position.set(0, 1.8, 2.0); snout.castShadow = true; dogGroup.add(snout);
    const tail = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 1.0), beigeMat);
    tail.position.set(0, 1.5, -1.5); tail.rotation.x = Math.PI / 4; tail.castShadow = true; dogGroup.add(tail);
    const legGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.8);
    const legPos = [[-0.5, 0.4, -0.8], [0.5, 0.4, -0.8], [-0.5, 0.4, 0.8], [0.5, 0.4, 0.8]];
    legPos.forEach(p => {
      const leg = new THREE.Mesh(legGeo, beigeMat);
      leg.position.set(...p); leg.castShadow = true; dogGroup.add(leg);
    });

    dogGroup.scale.set(2.2, 2.2, 2.2);
    return dogGroup;
  }

  const dogs = [];
  function populateDogs() {
    for(let i=0; i<3; i++) {
      let dogMesh = createDog();
      let rx, rz, isSafe;
      do {
        isSafe = true;
        rx = Math.random() * 1800 - 900;
        rz = Math.random() * 1100 - 300;
        if(getDistanceToRoad(rx, rz) < 100) isSafe = false;
        if(getMountainHeight(rx, rz) > getTerrainHeight(rx, rz) + 1.0) isSafe = false;
        for(let obs of obstacles) {
          const dx = rx - obs.x; const dz = rz - obs.z;
          if((dx*dx + dz*dz) < (obs.radius + 10.0)**2) { isSafe = false; break; }
        }
      } while(!isSafe);
      dogMesh.position.set(rx, getTerrainHeight(rx, rz), rz);
      scene.add(dogMesh);

      dogs.push({
        mesh: dogMesh,
        angle: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 0.3,
        actionTimer: Math.random() * 50,
        isMoving: true
      });
    }
  }

  function updateDogs() {
    dogs.forEach(dog => {
      dog.actionTimer--;
      if(dog.actionTimer <= 0) {
        dog.isMoving = Math.random() > 0.1;
        if(!dog.isMoving) {
          dog.actionTimer = 20 + Math.random() * 40;
        } else {
          dog.angle += (Math.random() - 0.5) * Math.PI;
          dog.actionTimer = 60 + Math.random() * 150;
        }
      }

      let canMove = dog.isMoving;
      const forwardDir = new THREE.Vector3(Math.sin(dog.angle), 0, Math.cos(dog.angle));
      let toPlayer = playerGroup.position.clone().sub(dog.mesh.position);

      if (toPlayer.lengthSq() < 400) {
        if (toPlayer.normalize().dot(forwardDir) > 0.2) {
          canMove = false; // Cățelul te așteaptă și el
        }
      }

      if(canMove) {
        const dx = Math.sin(dog.angle) * dog.speed;
        const dz = Math.cos(dog.angle) * dog.speed;
        const nx = dog.mesh.position.x + dx;
        const nz = dog.mesh.position.z + dz;

        if(!checkAnimalCollision(nx, nz, 3.0)) {
          dog.mesh.position.x = nx;
          dog.mesh.position.z = nz;
          dog.mesh.rotation.y = Math.atan2(dx, dz);
          const bounce = Math.abs(Math.sin(Date.now() * 0.025)) * 1.0;
          dog.mesh.position.y = getTerrainHeight(nx, nz) + bounce;
        } else {
          dog.angle += Math.PI + (Math.random() - 0.5);
          dog.actionTimer = 50;
          dog.isMoving = true;
        }
      } else {
        dog.mesh.position.y = getTerrainHeight(dog.mesh.position.x, dog.mesh.position.z);
      }
    });
  }

  // --- 12. LOGICA DE CONTROL PIETON (WASD) ---
  const keys = { w: false, a: false, s: false, d: false };

  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if(key === 'w' || e.key === 'ArrowUp') keys.w = true;
    if(key === 'a' || e.key === 'ArrowLeft') keys.a = true;
    if(key === 's' || e.key === 'ArrowDown') keys.s = true;
    if(key === 'd' || e.key === 'ArrowRight') keys.d = true;
  });

  document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if(key === 'w' || e.key === 'ArrowUp') keys.w = false;
    if(key === 'a' || e.key === 'ArrowLeft') keys.a = false;
    if(key === 's' || e.key === 'ArrowDown') keys.s = false;
    if(key === 'd' || e.key === 'ArrowRight') keys.d = false;
  });

  let playerSpeed = 0;
  const maxSpeed = 1.8;
  const accel = 0.15;
  const turnSpeed = 0.06;

  function checkPlayerCollision(nextX, nextZ) {
    const playerRadius = 3.5;

    if (nextX < -1950 || nextX > 1950 || nextZ > 1950 || nextZ < -1450) return true;

    const mY = getMountainHeight(nextX, nextZ);
    const tY = getTerrainHeight(nextX, nextZ);
    if (mY > tY + 1.0) return true;

    for(let obs of obstacles) {
      const dx = nextX - obs.x;
      const dz = nextZ - obs.z;
      if( (dx*dx + dz*dz) < (obs.radius + playerRadius)**2 ) return true;
    }

    for(let npc of npcCars) {
      const dx = nextX - npc.mesh.position.x;
      const dz = nextZ - npc.mesh.position.z;
      if( (dx*dx + dz*dz) < (7.0 + playerRadius)**2 ) return true; // Hitbox reglat la scara de 1.5 a mașinii
    }

    for(let cow of cows) {
      const dx = nextX - cow.mesh.position.x;
      const dz = nextZ - cow.mesh.position.z;
      if( (dx*dx + dz*dz) < (6.0 + playerRadius)**2 ) return true;
    }

    for(let dog of dogs) {
      const dx = nextX - dog.mesh.position.x;
      const dz = nextZ - dog.mesh.position.z;
      if( (dx*dx + dz*dz) < (3.0 + playerRadius)**2 ) return true;
    }

    return false;
  }

  function updatePlayer() {
    if(keys.a) playerGroup.rotation.y += turnSpeed;
    if(keys.d) playerGroup.rotation.y -= turnSpeed;

    if(keys.w) playerSpeed += accel;
    else if(keys.s) playerSpeed -= accel;
    else playerSpeed *= 0.8;

    playerSpeed = Math.max(-maxSpeed, Math.min(maxSpeed, playerSpeed));

    if(Math.abs(playerSpeed) < 0.05) playerSpeed = 0;

    const forwardVector = new THREE.Vector3(0, 0, 1).applyQuaternion(playerGroup.quaternion);
    const nextX = playerGroup.position.x + forwardVector.x * playerSpeed;
    const nextZ = playerGroup.position.z + forwardVector.z * playerSpeed;

    if(!checkPlayerCollision(nextX, nextZ)) {
      playerGroup.position.x = nextX;
      playerGroup.position.z = nextZ;
    } else {
      playerSpeed = 0;
    }

    let bob = 0;
    if (Math.abs(playerSpeed) > 0.1) {
      bob = Math.abs(Math.sin(Date.now() * 0.015)) * 0.5;
    }

    playerGroup.position.y = getTerrainHeight(playerGroup.position.x, playerGroup.position.z) + bob;
    controls.target.copy(playerGroup.position);
  }

  // --- INIȚIALIZARE ---
  createMountainsReal();
  createGround();
  createCircuit();
  populateField();
  populateStreetLights();
  populateCows();
  populateDogs();

  camera.position.set(0, 100, 200);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI / 2 - 0.05;
  controls.minDistance = 10;
  controls.maxDistance = 600;

  function animate() {
    requestAnimationFrame(animate);

    updateCows();
    updateDogs();
    updateNPCCars();
    updatePlayer();

    controls.update();
    renderer.render(scene, camera);
  }

  animate();
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
