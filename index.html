<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proiect SPG - Examen Complet (Trafic Inteligent)</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #8cb7e6; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      text-shadow: 1px 1px 2px black;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
<div id="info">EXAMEN FINAL: Conduce cu WASD. Trafic Inteligent!<br>Mașinile (4 NPC-uri) frânează automat ca să nu intre una în alta sau în tine.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  // --- 1. SETĂRI DE BAZĂ ȘI UMBRE ---
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x8cb7e6, 500, 3500);

  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1.0, 8000);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setClearColor(new THREE.Color(0.55, 0.72, 0.90));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const obstacles = [];

  // --- 2. LUMINI GLOBALE ---
  const ambientLight = new THREE.AmbientLight(new THREE.Color(0.40, 0.38, 0.35), 0.8);
  scene.add(ambientLight);

  const sunLight = new THREE.DirectionalLight(new THREE.Color(1.0, 0.95, 0.85), 1.2);
  sunLight.position.set(-500, 800, 400);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.width = 2048;
  sunLight.shadow.mapSize.height = 2048;
  sunLight.shadow.camera.near = 100;
  sunLight.shadow.camera.far = 3000;
  const d = 1500;
  sunLight.shadow.camera.left = -d;
  sunLight.shadow.camera.right = d;
  sunLight.shadow.camera.top = d;
  sunLight.shadow.camera.bottom = -d;
  sunLight.shadow.bias = -0.001;
  scene.add(sunLight);

  // --- 3. TEXTURI ---
  const textureLoader = new THREE.TextureLoader();
  const cerTexture = textureLoader.load('textures/cer.jpg');
  const muntiTexture = textureLoader.load('textures/munti.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  });
  const iarbaTexture = textureLoader.load('textures/iarba.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
  });
  const drumTexture = textureLoader.load('textures/drum.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(1, 25);
  });

  // --- 4. MATEMATICA TERENULUI ȘI A DRUMULUI ---
  const pathCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-700, 0, 400), new THREE.Vector3(-450, 0, 750),
    new THREE.Vector3(150, 0, 600),  new THREE.Vector3(550, 0, 850),
    new THREE.Vector3(800, 0, 300),  new THREE.Vector3(450, 0, -100),
    new THREE.Vector3(50, 0, -250),  new THREE.Vector3(-500, 0, -50)
  ], true);

  const roadPoints = pathCurve.getPoints(400);

  function getDistanceToRoad(x, z) {
    let minDistSq = Infinity;
    for (let i = 0; i < roadPoints.length; i++) {
      const p = roadPoints[i];
      const distSq = (x - p.x)**2 + (z - p.z)**2;
      if (distSq < minDistSq) minDistSq = distSq;
    }
    return Math.sqrt(minDistSq);
  }

  const bulldozerThreshold = 18.0;
  const ROAD_HEIGHT = 1.0;

  function clamp01(v) { return Math.max(0.0, Math.min(1.0, v)); }
  function ridged(x) { return Math.pow(1.0 - Math.abs(Math.sin(x)), 2.4); }

  function getRawTerrainHeight(x, z) {
    const bump1 = 15.0 * Math.exp(-((x * x) / 50000 + ((z + 80.0) * (z + 80.0)) / 30000));
    const waves = 12.0 * Math.sin(0.01 * x) * Math.cos(0.01 * z);
    let finalY = (bump1 + waves);
    if (finalY > bulldozerThreshold) {
      finalY = bulldozerThreshold + (finalY - bulldozerThreshold) * 0.2;
    }
    return finalY;
  }

  function getTerrainHeight(x, z) {
    const rawY = getRawTerrainHeight(x, z);
    const dist = getDistanceToRoad(x, z);
    const roadHalfWidth = 22;
    const blendZone = 40;

    if (dist < roadHalfWidth) return ROAD_HEIGHT;
    else if (dist < roadHalfWidth + blendZone) {
      let t = (dist - roadHalfWidth) / blendZone;
      t = t * t * (3 - 2 * t);
      return ROAD_HEIGHT * (1 - t) + rawY * t;
    } else return rawY;
  }

  function getMountainHeight(x, z) {
    if (z > -300) return -9999;
    let dist = clamp01((-z - 300.0) / 1100.0);
    const t1 = 0.0032 * x + 0.0017 * z;
    const t2 = 0.0067 * x - 0.0039 * z;
    const t3 = 0.0130 * x + 0.0110 * z;
    const base = 0.55 * (Math.sin(t1) * 0.5 + 0.5) + 0.35 * (Math.sin(t2) * 0.5 + 0.5) + 0.10 * (Math.sin(t3) * 0.5 + 0.5);
    const spikes = 0.55 * ridged(2.2 * t1) + 0.30 * ridged(3.7 * t2) + 0.15 * ridged(6.0 * t3);
    let h = Math.pow(0.78 * base + 0.22 * spikes, 1.25);
    return (h * (40.0 + dist * 520.0) * 1.22) - 115.0;
  }

  // --- 5. CER ȘI MUNȚI ---
  const skyboxGeometry = new THREE.BoxGeometry(4000, 4000, 4000);
  const skyboxMaterials = [
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ color: 0x8cb7e6, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }),
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false })
  ];
  scene.add(new THREE.Mesh(skyboxGeometry, skyboxMaterials));

  function createMountainsReal() {
    const mountainGeo = new THREE.PlaneGeometry(3800, 1150, 180, 90);
    mountainGeo.rotateX(-Math.PI / 2);
    mountainGeo.translate(0, 0, -875);

    const pos = mountainGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
      pos.setY(i, getMountainHeight(pos.getX(i), pos.getZ(i)));
    }
    mountainGeo.computeVertexNormals();
    const mountainMesh = new THREE.Mesh(mountainGeo, new THREE.MeshPhongMaterial({ map: muntiTexture, color: 0x888888 }));
    mountainMesh.receiveShadow = true;
    scene.add(mountainMesh);
  }

  // --- 6. TEREN SINGULAR ---
  function createGround() {
    const groundGeo = new THREE.PlaneGeometry(4000, 4000, 256, 256);
    groundGeo.rotateX(-Math.PI / 2);

    const pos = groundGeo.attributes.position;
    for(let i = 0; i < pos.count; i++) {
      pos.setY(i, getTerrainHeight(pos.getX(i), pos.getZ(i)));
    }
    groundGeo.computeVertexNormals();
    const groundMesh = new THREE.Mesh(groundGeo, new THREE.MeshPhongMaterial({ map: iarbaTexture }));
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);
  }

  // --- 7. CIRCUIT PANGLICĂ ---
  function createCircuit() {
    const pointsCount = 400;
    const roadWidth = 40;
    const vertices = [], uvs = [], indices = [], normals = [];

    for(let i = 0; i <= pointsCount; i++) {
      const t = i / pointsCount;
      const pt = pathCurve.getPointAt(t);
      const tangent = pathCurve.getTangentAt(t).normalize();
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();

      const pLeft = pt.clone().add(normal.clone().multiplyScalar(roadWidth / 2));
      const pRight = pt.clone().add(normal.clone().multiplyScalar(-roadWidth / 2));

      pLeft.y = getTerrainHeight(pLeft.x, pLeft.z) + 1.5;
      pRight.y = getTerrainHeight(pRight.x, pRight.z) + 1.5;

      vertices.push(pLeft.x, pLeft.y, pLeft.z);
      vertices.push(pRight.x, pRight.y, pRight.z);

      normals.push(0, 1, 0, 0, 1, 0);
      uvs.push(0, t * 25, 1, t * 25);
    }

    for(let i = 0; i < pointsCount; i++) {
      const idx = i * 2;
      indices.push(idx, idx+2, idx+1);
      indices.push(idx+1, idx+2, idx+3);
    }

    const roadGeo = new THREE.BufferGeometry();
    roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    roadGeo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
    roadGeo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
    roadGeo.setIndex(indices);

    const potecaMesh = new THREE.Mesh(roadGeo, new THREE.MeshPhongMaterial({ map: drumTexture, side: THREE.DoubleSide }));
    potecaMesh.receiveShadow = true;
    scene.add(potecaMesh);
  }

  // --- 8. OBIECTE STATICE ---
  function createEdelweiss() {
    const flowerGroup = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10, 4), new THREE.MeshPhongMaterial({ color: 0x447744 }));
    stem.position.y = 5; stem.castShadow = true; flowerGroup.add(stem);
    const center = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshPhongMaterial({ color: 0xffcc44 }));
    center.position.y = 10; center.castShadow = true; flowerGroup.add(center);
    const petalGeo = new THREE.ConeGeometry(1, 5, 3);
    petalGeo.rotateX(-Math.PI / 2);
    for (let i = 0; i < 6; i++) {
      const petal = new THREE.Mesh(petalGeo, new THREE.MeshPhongMaterial({ color: 0xffffff }));
      const angle = (Math.PI * 2 / 6) * i;
      petal.position.set(1.5 * Math.cos(angle), 10.2, 1.5 * Math.sin(angle));
      petal.rotation.y = angle; petal.castShadow = true;
      flowerGroup.add(petal);
    }
    flowerGroup.scale.set(0.7, 0.7, 0.7);
    return flowerGroup;
  }

  function createStone() {
    const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(3 + Math.random() * 4, 0), new THREE.MeshPhongMaterial({ color: 0x888888, flatShading: true }));
    stone.scale.set(1 + Math.random() * 0.5, 0.6 + Math.random() * 0.4, 1 + Math.random() * 0.5);
    stone.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    stone.castShadow = true; stone.receiveShadow = true;
    return stone;
  }

  function createPineTreeTall() {
    const treeGroup = new THREE.Group();
    const trunkHeight = 25 + Math.random() * 10;
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 2.2, trunkHeight, 6), new THREE.MeshPhongMaterial({ color: 0x5c4033, flatShading: true }));
    trunk.position.y = trunkHeight / 2; trunk.castShadow = true; trunk.receiveShadow = true; treeGroup.add(trunk);
    const leavesMat = new THREE.MeshPhongMaterial({ color: [0x224422, 0x1a3a1a, 0x2a502a][Math.floor(Math.random()*3)], flatShading: true });
    const coneCount = 3 + Math.floor(Math.random() * 2);
    for (let i = 0; i < coneCount; i++) {
      const cone = new THREE.Mesh(new THREE.ConeGeometry(9 - (i * 1.5), 18 - (i * 1.5), 7), leavesMat);
      cone.position.y = trunkHeight + (i * 7); cone.castShadow = true; cone.receiveShadow = true; treeGroup.add(cone);
    }
    const finalScale = 1.0 + Math.random() * 0.5;
    treeGroup.scale.set(finalScale, finalScale, finalScale);
    return treeGroup;
  }

  function createStreetLight(position, directionToRoad) {
    const group = new THREE.Group();
    group.position.copy(position);

    const metalMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.5, 45, 8), metalMat);
    pole.position.y = 22.5; pole.castShadow = true; group.add(pole);

    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 14, 8), metalMat);
    arm.rotation.x = Math.PI / 2; arm.position.set(0, 43, 7); arm.castShadow = true; group.add(arm);

    const bulb = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshBasicMaterial({ color: 0xffffee }));
    bulb.position.set(0, 42.5, 13); group.add(bulb);

    const spotLight = new THREE.SpotLight(0xffeedd, 3.5, 400, Math.PI / 3, 0.6, 1.5);
    spotLight.position.set(0, 42.5, 13);
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.width = 1024; spotLight.shadow.mapSize.height = 1024;
    spotLight.shadow.bias = -0.001;

    const target = new THREE.Object3D();
    target.position.set(0, 0, 30);
    group.add(target); spotLight.target = target; group.add(spotLight);

    const targetPos = position.clone().add(directionToRoad);
    targetPos.y = position.y;
    group.lookAt(targetPos);
    scene.add(group);
  }

  function isOnRoad(x, z, threshold = 95) {
    return getDistanceToRoad(x, z) < threshold;
  }

  function populateField() {
    let count = 0;
    while (count < 60) {
      const rX = Math.random() * 1800 - 900, rZ = Math.random() * 1100 - 300;
      if (!isOnRoad(rX, rZ, 80)) {
        const cluster = new THREE.Group();
        cluster.position.set(rX, getTerrainHeight(rX, rZ), rZ);

        for (let j = 0; j < 3; j++) {
          const flower = createEdelweiss();
          const offsetX = Math.random() * 20 - 10;
          const offsetZ = Math.random() * 20 - 10;

          flower.position.set(offsetX, 0, offsetZ);
          flower.rotation.y = Math.random() * Math.PI;
          cluster.add(flower);

          const flowerWorldX = rX + offsetX;
          const flowerWorldZ = rZ + offsetZ;
          obstacles.push({ x: flowerWorldX, z: flowerWorldZ, radius: 1.5 });
        }
        scene.add(cluster); count++;
      }
    }

    count = 0;
    while (count < 70) {
      const rX = Math.random() * 1800 - 900, rZ = Math.random() * 1100 - 300;
      if (!isOnRoad(rX, rZ, 80)) {
        const stone = createStone();
        stone.position.set(rX, getTerrainHeight(rX, rZ), rZ);
        scene.add(stone); count++;
        obstacles.push({ x: rX, z: rZ, radius: 4.0 });
      }
    }

    count = 0;
    while (count < 75) {
      const rX = Math.random() * 1800 - 900, rZ = Math.random() * 1100 - 300;
      if (!isOnRoad(rX, rZ, 110)) {
        const tree = createPineTreeTall();
        tree.position.set(rX, getTerrainHeight(rX, rZ), rZ);
        scene.add(tree); count++;
        obstacles.push({ x: rX, z: rZ, radius: 3.5 });
      }
    }
  }

  function populateStreetLights() {
    const numLights = 14;
    for (let i = 0; i < numLights; i++) {
      const t = i / numLights;
      const point = pathCurve.getPointAt(t);
      const tangent = pathCurve.getTangentAt(t).normalize();
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
      const offset = 45;
      const lightPos = point.clone().add(normal.clone().multiplyScalar(offset));
      lightPos.y = getTerrainHeight(lightPos.x, lightPos.z);

      const dirToRoad = normal.clone().multiplyScalar(-1);
      createStreetLight(lightPos, dirToRoad);

      obstacles.push({ x: lightPos.x, z: lightPos.z, radius: 4.0 });
    }
  }

  // --- 9. CONSTRUIREA MAȘINILOR ---
  function createCarModel(bodyColor) {
    const group = new THREE.Group();

    const chassisGeo = new THREE.BoxGeometry(6, 4, 12);
    const chassisMat = new THREE.MeshPhongMaterial({ color: bodyColor });
    const chassis = new THREE.Mesh(chassisGeo, chassisMat);
    chassis.position.y = 3;
    chassis.castShadow = true;
    group.add(chassis);

    const wheelGeo = new THREE.CylinderGeometry(1.5, 1.5, 1.5, 16);
    wheelGeo.rotateZ(Math.PI / 2);
    const wheelMat = new THREE.MeshPhongMaterial({ color: 0x222222 });

    const wheelPositions = [
      [-3.5, 1.5, -4], [3.5, 1.5, -4],
      [-3.5, 1.5, 4],  [3.5, 1.5, 4]
    ];

    wheelPositions.forEach(pos => {
      const wheel = new THREE.Mesh(wheelGeo, wheelMat);
      wheel.position.set(pos[0], pos[1], pos[2]);
      wheel.castShadow = true;
      group.add(wheel);
    });

    return group;
  }

  // 9.1 MAȘINA JUCĂTORULUI (Roșie)
  const carGroup = createCarModel(0xcc0000);
  scene.add(carGroup);

  const startPos = pathCurve.getPointAt(0);
  carGroup.position.set(startPos.x, getTerrainHeight(startPos.x, startPos.z) + 1.5, startPos.z);

  const startTangent = pathCurve.getTangentAt(0);
  const lookTarget = startPos.clone().add(startTangent);
  lookTarget.y = carGroup.position.y;
  carGroup.lookAt(lookTarget);

  // 9.2 MAȘINILE NPC (4 Mașini pe 2 benzi)
  const npcCars = [
    { mesh: createCarModel(0x0044cc), t: 0.10, speed: 0.0006, lane: 10 }, // Albastră, banda dreaptă (mai rapidă)
    { mesh: createCarModel(0x00cc44), t: 0.30, speed: 0.0006, lane: 10 }, // Verde, banda dreaptă (lenta)
    { mesh: createCarModel(0xff8800), t: 0.50, speed: 0.0005, lane: -8 }, // Portocalie, banda stângă
    { mesh: createCarModel(0xaa00cc), t: 0.80, speed: 0.0005, lane: -8 }  // Mov, banda stângă
  ];

  npcCars.forEach(npc => scene.add(npc.mesh));

  // --- LOGICĂ INTELIGENTĂ (AI) PENTRU TRAFIC ---
  function updateNPCCars() {
    npcCars.forEach((npc, index) => {
      let canMove = true;
      const npcPos = npc.mesh.position;

      // Vectorul care indică strict în față pe traiectoria curbei
      const forwardDir = pathCurve.getTangentAt(npc.t).normalize();

      // Regula 1: Evită Jucătorul (Roșu)
      let toPlayer = carGroup.position.clone().sub(npcPos);
      if (toPlayer.lengthSq() < 400) { // Distanță de alertă (aprox 20 unități)
        // Verifică dacă ești ÎN FAȚA lui (folosind Produsul Scalar / Dot Product)
        if (toPlayer.normalize().dot(forwardDir) > 0.3) {
          canMove = false; // Frânează!
        }
      }

      // Regula 2: Evită celelalte mașini NPC
      npcCars.forEach((otherNpc, j) => {
        if (index === j) return; // Nu te verifica pe tine însuți

        let toOther = otherNpc.mesh.position.clone().sub(npcPos);
        if (toOther.lengthSq() < 400) {
          // Dacă e în fața ta pe aceeași traiectorie, oprește-te!
          if (toOther.normalize().dot(forwardDir) > 0.3) {
            canMove = false;
          }
        }
      });

      // Dacă drumul e liber, rulează!
      if (canMove) {
        npc.t += npc.speed;
        if (npc.t > 1.0) npc.t -= 1.0;
      }

      // Actualizăm modelul 3D pe șosea
      const pt = pathCurve.getPointAt(npc.t);
      const tangent = pathCurve.getTangentAt(npc.t).normalize();
      const normal = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();

      const finalPos = pt.clone().add(normal.multiplyScalar(npc.lane));
      npc.mesh.position.set(finalPos.x, getTerrainHeight(finalPos.x, finalPos.z) + 1.5, finalPos.z);

      const lookT = finalPos.clone().add(tangent);
      lookT.y = npc.mesh.position.y;
      npc.mesh.lookAt(lookT);
    });
  }

  // --- LOGICA DE CONTROL PENTRU JUCĂTOR ---
  const keys = { w: false, a: false, s: false, d: false };

  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if(key === 'w' || e.key === 'ArrowUp') keys.w = true;
    if(key === 'a' || e.key === 'ArrowLeft') keys.a = true;
    if(key === 's' || e.key === 'ArrowDown') keys.s = true;
    if(key === 'd' || e.key === 'ArrowRight') keys.d = true;
  });

  document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if(key === 'w' || e.key === 'ArrowUp') keys.w = false;
    if(key === 'a' || e.key === 'ArrowLeft') keys.a = false;
    if(key === 's' || e.key === 'ArrowDown') keys.s = false;
    if(key === 'd' || e.key === 'ArrowRight') keys.d = false;
  });

  let carSpeed = 0;
  const maxSpeed = 3.5;
  const accel = 0.08;
  const turnSpeed = 0.04;

  function checkCollision(nextX, nextZ) {
    const carRadius = 3.0;

    // 1. Marginea lumii
    if (nextX < -1950 || nextX > 1950 || nextZ > 1950 || nextZ < -1450) return true;

    // 2. Muntele
    const mY = getMountainHeight(nextX, nextZ);
    const tY = getTerrainHeight(nextX, nextZ);
    if (mY > tY + 1.0) return true;

    // 3. Obiecte statice
    for(let obs of obstacles) {
      const dx = nextX - obs.x;
      const dz = nextZ - obs.z;
      if( (dx*dx + dz*dz) < (obs.radius + carRadius)**2 ) return true;
    }

    // 4. Te lovești fizic de alte mașini
    for(let npc of npcCars) {
      const dx = nextX - npc.mesh.position.x;
      const dz = nextZ - npc.mesh.position.z;
      if( (dx*dx + dz*dz) < 100 ) return true; // Coliziune masivă (raza 10)
    }

    return false;
  }

  function updatePlayerCar() {
    if(keys.w) carSpeed += accel;
    else if(keys.s) carSpeed -= accel;
    else carSpeed *= 0.95;

    carSpeed = Math.max(-maxSpeed, Math.min(maxSpeed, carSpeed));

    if(Math.abs(carSpeed) > 0.1) {
      if(keys.a) carGroup.rotation.y += turnSpeed * Math.sign(carSpeed);
      if(keys.d) carGroup.rotation.y -= turnSpeed * Math.sign(carSpeed);
    }

    const forwardVector = new THREE.Vector3(0, 0, 1).applyQuaternion(carGroup.quaternion);
    const nextX = carGroup.position.x + forwardVector.x * carSpeed;
    const nextZ = carGroup.position.z + forwardVector.z * carSpeed;

    if(!checkCollision(nextX, nextZ)) {
      carGroup.position.x = nextX;
      carGroup.position.z = nextZ;
    } else {
      carSpeed = 0; // Accident!
    }

    carGroup.position.y = getTerrainHeight(carGroup.position.x, carGroup.position.z) + 1.5;
    controls.target.copy(carGroup.position);
  }

  // --- INIȚIALIZARE ---
  createMountainsReal();
  createGround();
  createCircuit();
  populateField();
  populateStreetLights();

  camera.position.set(0, 400, 1200);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.maxPolarAngle = Math.PI / 2 - 0.05;
  controls.minDistance = 20;
  controls.maxDistance = 600;

  function animate() {
    requestAnimationFrame(animate);

    updateNPCCars();
    updatePlayerCar();

    controls.update();
    renderer.render(scene, camera);
  }

  animate();
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
