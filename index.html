<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proiect SPG - P1: Peisaj Montan Matematic (Port C++ la Three.js)</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #8cb7e6; } /* Culoarea de cer din OpenGL (0.55, 0.72, 0.90) */
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      color: white;
      font-family: sans-serif;
      text-shadow: 1px 1px 2px black;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
<div id="info">P1: Teren și Munți generați matematic (Portat din C++)</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // --- 1. SETĂRI DE BAZĂ (Echivalentul init() din OpenGL) ---
  const scene = new THREE.Scene();
  // Setăm perspectiva similar cu gluPerspective(55.0, w/h, 1.0, 8000.0)
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1.0, 8000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  // Setăm culoarea de fundal exact ca glClearColor din cod
  renderer.setClearColor(new THREE.Color(0.55, 0.72, 0.90));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // --- 2. LUMINI (Echivalentul glLight0 din cod) ---
  // Lumina ambientala globala { 0.50f, 0.48f, 0.40f }
  const ambientLight = new THREE.AmbientLight(new THREE.Color(0.50, 0.48, 0.40), 1.0);
  scene.add(ambientLight);

  // Lumina principala (soarele) { -100.0f, 300.0f, 200.0f }
  const sunLight = new THREE.DirectionalLight(new THREE.Color(1.0, 0.95, 0.80), 1.5);
  sunLight.position.set(-100, 300, 200);
  scene.add(sunLight);

  // --- 3. TEXTURI ---
  const textureLoader = new THREE.TextureLoader();
  // NOTĂ: Dacă în OpenGL texturile aveau flipY=true, în Three.js trebuie să avem grijă, dar default este true.
  const cerTexture = textureLoader.load('textures/cer.jpg');
  const muntiTexture = textureLoader.load('textures/munti.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
  });
  const iarbaTexture = textureLoader.load('textures/iarba.jpg', (tex) => {
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
  });

  // --- 4. CER (Skybox) - drawSky() ---
  // În codul original skybox-ul avea latura de 4000 (E = 2000)
  const skyboxGeometry = new THREE.BoxGeometry(4000, 4000, 4000);
  const skyboxMaterials = [
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }), // Dreapta
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }), // Stânga
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }), // Sus
    new THREE.MeshBasicMaterial({ color: 0x8cb7e6, side: THREE.BackSide, depthWrite: false }), // Jos (fără textură pe jos în cod)
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false }), // Față
    new THREE.MeshBasicMaterial({ map: cerTexture, side: THREE.BackSide, depthWrite: false })  // Spate
  ];
  const skybox = new THREE.Mesh(skyboxGeometry, skyboxMaterials);
  // În codul tău, skybox-ul urmărește camera, dar în Three.js e mai ușor să-l punem pur și simplu imens
  scene.add(skybox);


  // --- HELPER MATH FUNCTIONS DIN C++ ---
  function clamp01(v) { return Math.max(0.0, Math.min(1.0, v)); }

  function ridged(x) {
    let v = 1.0 - Math.abs(Math.sin(x));
    return Math.pow(v, 2.4);
  }


  // --- 5. MUNȚII ÎN FUNDAL - drawMountainsReal() ---
  function createMountainsReal() {
    const xMin = -1900.0, xMax = 1900.0;
    const zNear = -700.0, zFar = -1850.0;
    const NX = 180, NZ = 90;
    const yOffset = -115.0;
    const MOUNTAIN_HEIGHT_SCALE = 1.22;

    const width = xMax - xMin;
    const depth = zNear - zFar;

    const mountainGeo = new THREE.PlaneGeometry(width, depth, NX, NZ);
    // Rotim să fie orizontal, dar atenție la orientarea pe axa Z
    mountainGeo.rotateX(-Math.PI / 2);

    // Mutăm geometria pentru a se potrivi cu coordonatele din OpenGL
    mountainGeo.translate((xMax+xMin)/2, 0, (zNear+zFar)/2);

    const pos = mountainGeo.attributes.position;
    const uv = mountainGeo.attributes.uv;

    const texScale = 0.0060;

    for (let i = 0; i < pos.count; i++) {
      const x = pos.getX(i);
      const z = pos.getZ(i);

      // mountainHeight() din C++
      let dist = (-z - 700.0) / 1100.0;
      dist = clamp01(dist);

      const t1 = 0.0032 * x + 0.0017 * z;
      const t2 = 0.0067 * x - 0.0039 * z;
      const t3 = 0.0130 * x + 0.0110 * z;

      const base = 0.55 * (Math.sin(t1) * 0.5 + 0.5)
        + 0.35 * (Math.sin(t2) * 0.5 + 0.5)
        + 0.10 * (Math.sin(t3) * 0.5 + 0.5);

      const spikes = 0.55 * ridged(2.2 * t1)
        + 0.30 * ridged(3.7 * t2)
        + 0.15 * ridged(6.0 * t3);

      let h = 0.78 * base + 0.22 * spikes;
      h = Math.pow(h, 1.25);

      const H_m = (40.0 + dist * 520.0) * MOUNTAIN_HEIGHT_SCALE;
      const finalY = (h * H_m) + yOffset;

      pos.setY(i, finalY);

      // Setăm UV-urile ca în C++: glTexCoord2f((x - xMin) * texScale, (-z) * texScale)
      uv.setXY(i, (x - xMin) * texScale, (-z) * texScale);
    }

    mountainGeo.computeVertexNormals();

    const mountainMat = new THREE.MeshPhongMaterial({
      map: muntiTexture,
      shininess: 8.0, // mat_shin[] = { 8.0f }
      specular: new THREE.Color(0.06, 0.06, 0.06), // mat_spec[] = { 0.06f, 0.06f, 0.06f }
      color: new THREE.Color(0.8, 0.8, 0.8), // Puțin alb ca să ia lumina soarelui (ca glColor3f din loop)
      flatShading: false
    });

    const mountainMesh = new THREE.Mesh(mountainGeo, mountainMat);
    scene.add(mountainMesh);

    // SKIRT (Fusta care trage munții în jos)
    // Pentru a simplifica în Three.js, adăugăm un "zid" masiv sub fața frontală a munților
    const skirtGeo = new THREE.PlaneGeometry(width, Math.abs(-220 - yOffset), NX, 1);
    skirtGeo.translate((xMax+xMin)/2, -220 + Math.abs(-220 - yOffset)/2, zNear);

    // Skirt-ul avea o culoare mai închisă
    const skirtMat = new THREE.MeshBasicMaterial({ color: 0x595959 });
    const skirtMesh = new THREE.Mesh(skirtGeo, skirtMat);
    scene.add(skirtMesh);
  }

  // --- 6. PLANUL MARE ȘI PATCH-UL DE RELIEF (drawDesertFloor & drawGroundReliefPatch) ---
  function createGround() {
    // A. Planul de bază imens (S = 2000)
    const groundGeo = new THREE.PlaneGeometry(4000, 4000);
    groundGeo.rotateX(-Math.PI / 2);

    // Setăm UV să repete de 40 de ori
    const uvs = groundGeo.attributes.uv;
    for(let i=0; i<uvs.count; i++) {
      uvs.setXY(i, uvs.getX(i)*40, uvs.getY(i)*40);
    }

    const groundMat = new THREE.MeshLambertMaterial({ map: iarbaTexture, color: 0xffffff });
    const groundMesh = new THREE.Mesh(groundGeo, groundMat);
    scene.add(groundMesh);

    // B. Patch-ul de relief din mijloc
    const xMin = -520.0, xMax = 520.0;
    const zMin = -260.0, zMax = 420.0;
    const NX = 90, NZ = 80;
    const RELIEF_SCALE = 1.70;

    const patchGeo = new THREE.PlaneGeometry(xMax-xMin, zMax-zMin, NX, NZ);
    patchGeo.rotateX(-Math.PI / 2);
    patchGeo.translate((xMax+xMin)/2, 0, (zMax+zMin)/2);

    const patchPos = patchGeo.attributes.position;
    const patchUv = patchGeo.attributes.uv;
    const worldTex = 0.01;
    const S = 2000.0;

    for(let i=0; i<patchPos.count; i++) {
      const x = patchPos.getX(i);
      const z = patchPos.getZ(i);

      // Falloff
      const dx = Math.min(x - xMin, xMax - x);
      const dz = Math.min(z - zMin, zMax - z);
      let fx = clamp01(dx / 140.0);
      let fz = clamp01(dz / 140.0);
      fx = fx * fx * (3.0 - 2.0 * fx);
      fz = fz * fz * (3.0 - 2.0 * fz);
      const f = fx * fz;

      // Height Raw
      const bump1 = 15.0 * Math.exp(-((x * x) / (2.0 * 230.0 * 230.0) + ((z + 80.0) * (z + 80.0)) / (2.0 * 170.0 * 170.0)));
      const bump2 = 10.0 * Math.exp(-(((x - 180.0) * (x - 180.0)) / (2.0 * 190.0 * 190.0) + ((z - 120.0) * (z - 120.0)) / (2.0 * 150.0 * 150.0)));
      const waves = 1.8 * Math.sin(0.018 * x) * Math.cos(0.015 * z);

      const finalY = (bump1 + bump2 + waves) * RELIEF_SCALE * f;
      patchPos.setY(i, finalY);

      // Mapare UV ca în C++: glTexCoord2f((x + S) * worldTex, (z + S) * worldTex);
      patchUv.setXY(i, (x + S) * worldTex, (z + S) * worldTex);
    }

    patchGeo.computeVertexNormals();

    // Folosim depthWrite: false pentru a evita z-fighting exact ca glPolygonOffset din OpenGL
    const patchMat = new THREE.MeshLambertMaterial({
      map: iarbaTexture,
      polygonOffset: true,
      polygonOffsetFactor: -1.0,
      polygonOffsetUnits: -1.0
    });
    const patchMesh = new THREE.Mesh(patchGeo, patchMat);
    scene.add(patchMesh);
  }

  // Apelăm funcțiile de generare
  createMountainsReal();
  createGround();

  // --- 7. CAMERA (Echivalentul gluLookAt(0, 25, 700, 0, 8, 0, 0, 1, 0)) ---
  camera.position.set(0, 25, 700);
  camera.lookAt(0, 8, 0);

  // --- 8. ANIMAȚIE ---
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }

  // --- 9. REDIMENSIONARE ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
</script>
</body>
</html>
